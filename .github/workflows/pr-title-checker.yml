name: "PR Title Checker"
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR Title Format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          
          # Use grep to check if the title starts with Capital Letters, a dash, and Numbers
          if echo "$TITLE" | grep -qE "^[A-Z]+-[0-9]+"; then
            echo "Success: PR title contains a valid Jira token."
            exit 0
          else
            echo "Error: Your PR title '$TITLE' is invalid."
            echo "It must start with a Jira ticket ID (e.g., KTR-123 or PROJ-45)."
            exit 1
          fi