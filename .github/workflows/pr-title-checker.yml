name: "PR Title Checker"
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR Title Format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          
          # Check if the title contains "KAN-" followed by numbers anywhere
          if echo "$TITLE" | grep -qE "KAN-[0-9]+"; then
            echo "Success: PR title contains a valid Jira token."
            exit 0
          else
            echo "Error: Your PR title '$TITLE' is invalid."
            echo "It must contain a Jira ticket ID (e.g., KAN-123) anywhere in the title."
            exit 1
          fi